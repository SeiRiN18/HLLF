{% extends 'base.html' %}

{% block title %}Вхід{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1>Вхід до системи</h1>
        <form method="post" class="auth-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Ім'я користувача</label>
                <input type="text" name="username" id="id_username" class="form-control" autofocus required>
            </div>
            <div class="form-group">
                <label for="id_password">Пароль</label>
                <input type="password" name="password" id="id_password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Увійти</button>
        </form>
        <p class="auth-link">Немає акаунту? <a href="{% url 'register' %}">Зареєструватись</a></p>
    </div>
</div>
{% endblock %}
