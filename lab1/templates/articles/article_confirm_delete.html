{% extends 'base.html' %}

{% block title %}Видалити статтю{% endblock %}

{% block content %}
<div class="form-page">
    <div class="confirm-delete">
        <h1>Видалити статтю?</h1>
        <p>Ви впевнені, що хочете видалити статтю <strong>"{{ article.title }}"</strong>?</p>
        <p class="text-muted">Цю дію неможливо скасувати.</p>
        <form method="post">
            {% csrf_token %}
            <div class="form-actions">
                <button type="submit" class="btn btn-danger">Так, видалити</button>
                <a href="{% url 'article_detail' article.pk %}" class="btn btn-outline">Скасувати</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
